<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">MeetFlow Console 预览图</title>
  <desc id="desc">展示 MeetFlow Console 的主要模块：服务控制、真实联调、任务状态、运行日志。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="70" y="58" width="1060" height="604" rx="28" fill="#f8fafc" filter="url(#shadow)"/>
  <rect x="70" y="58" width="1060" height="72" rx="28" fill="#ffffff"/>
  <circle cx="112" cy="94" r="9" fill="#ef4444"/>
  <circle cx="140" cy="94" r="9" fill="#f59e0b"/>
  <circle cx="168" cy="94" r="9" fill="#10b981"/>
  <text x="210" y="101" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f172a">MeetFlow Console</text>
  <text x="910" y="101" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">127.0.0.1:5173</text>

  <rect x="100" y="158" width="235" height="450" rx="18" fill="#0f172a"/>
  <text x="128" y="198" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff">导航</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="15">
    <rect x="122" y="230" width="190" height="40" rx="10" fill="#1d4ed8"/>
    <text x="148" y="256" fill="#ffffff">真实联调</text>
    <rect x="122" y="286" width="190" height="40" rx="10" fill="#1e293b"/>
    <text x="148" y="312" fill="#cbd5e1">Dashboard</text>
    <rect x="122" y="342" width="190" height="40" rx="10" fill="#1e293b"/>
    <text x="148" y="368" fill="#cbd5e1">Jobs &amp; Health</text>
    <rect x="122" y="398" width="190" height="40" rx="10" fill="#1e293b"/>
    <text x="148" y="424" fill="#cbd5e1">M3 会前卡片</text>
  </g>

  <rect x="370" y="158" width="330" height="185" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="398" y="198" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#0f172a">后台服务控制</text>
  <rect x="398" y="222" width="105" height="32" rx="16" fill="#dcfce7"/>
  <text x="424" y="243" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#166534">Worker</text>
  <rect x="518" y="222" width="135" height="32" rx="16" fill="#dbeafe"/>
  <text x="544" y="243" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1d4ed8">SDK Callback</text>
  <rect x="398" y="276" width="255" height="38" rx="10" fill="#eff6ff"/>
  <text x="422" y="301" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e3a8a">启动 / 停止 / 查看日志</text>

  <rect x="730" y="158" width="350" height="185" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="758" y="198" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#0f172a">M4 真实联调</text>
  <rect x="758" y="222" width="290" height="42" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="780" y="248" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">粘贴飞书妙记链接</text>
  <rect x="758" y="282" width="120" height="38" rx="10" fill="#3370ff"/>
  <text x="790" y="306" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">发送卡片</text>

  <rect x="370" y="374" width="330" height="185" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="398" y="414" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#0f172a">任务与风险状态</text>
  <rect x="398" y="440" width="74" height="58" rx="12" fill="#eff6ff"/>
  <text x="424" y="464" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#1d4ed8">12</text>
  <text x="416" y="486" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">待确认</text>
  <rect x="492" y="440" width="74" height="58" rx="12" fill="#ecfdf5"/>
  <text x="518" y="464" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#047857">8</text>
  <text x="510" y="486" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">已落地</text>
  <rect x="586" y="440" width="74" height="58" rx="12" fill="#fff7ed"/>
  <text x="612" y="464" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#c2410c">3</text>
  <text x="604" y="486" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">风险项</text>

  <rect x="730" y="374" width="350" height="185" rx="18" fill="#0f172a"/>
  <text x="758" y="414" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff">运行日志</text>
  <text x="758" y="450" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#93c5fd">$ run m4 --allow-write</text>
  <text x="758" y="478" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#bbf7d0">card sent: summary + pending tasks</text>
  <text x="758" y="506" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#fde68a">waiting for callback...</text>
  <text x="758" y="534" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#bbf7d0">task created after confirmation</text>
</svg>
