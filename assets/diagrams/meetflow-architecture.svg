<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MeetFlow 项目架构图</title>
  <desc id="desc">展示飞书、MeetFlow Agent Runtime、LLM、策略与本地存储之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf5ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3370ff"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="72" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800" fill="#0f172a">MeetFlow 技术架构</text>
  <text x="60" y="108" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#475569">飞书真实协作载体 + Agent 编排 + LLM 理解生成 + Policy 安全边界</text>

  <rect x="54" y="145" width="250" height="500" rx="18" fill="#ffffff" stroke="#c7d2fe" filter="url(#shadow)"/>
  <text x="84" y="190" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#1e3a8a">飞书办公场景</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="16" fill="#0f172a">
    <rect x="84" y="225" width="190" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="110" y="258">日历 Calendar</text>
    <rect x="84" y="300" width="190" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="110" y="333">妙记 Minutes</text>
    <rect x="84" y="375" width="190" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="110" y="408">群聊 IM</text>
    <rect x="84" y="450" width="190" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="110" y="483">互动卡片</text>
    <rect x="84" y="525" width="190" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="110" y="558">飞书任务</text>
  </g>

  <rect x="380" y="145" width="440" height="500" rx="18" fill="#ffffff" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text x="410" y="190" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#065f46">MeetFlow Agent Runtime</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="15" fill="#0f172a">
    <rect x="430" y="224" width="340" height="48" rx="12" fill="url(#green)" opacity="0.95"/>
    <text x="462" y="254" fill="#ffffff" font-weight="700">WorkflowRouter：识别会议业务场景</text>
    <rect x="430" y="295" width="340" height="48" rx="12" fill="#ecfdf5" stroke="#86efac"/>
    <text x="462" y="325">WorkflowContextBuilder：构建会议上下文</text>
    <rect x="430" y="366" width="340" height="48" rx="12" fill="#ecfdf5" stroke="#86efac"/>
    <text x="462" y="396">MeetFlowAgentLoop：多轮推理与工具调用</text>
    <rect x="430" y="437" width="340" height="48" rx="12" fill="#ecfdf5" stroke="#86efac"/>
    <text x="462" y="467">ToolRegistry：统一工具协议与执行入口</text>
    <rect x="430" y="508" width="340" height="48" rx="12" fill="#ecfdf5" stroke="#86efac"/>
    <text x="462" y="538">AgentPolicy：写操作、幂等、确认校验</text>
  </g>

  <rect x="895" y="145" width="250" height="215" rx="18" fill="#ffffff" stroke="#fed7aa" filter="url(#shadow)"/>
  <text x="925" y="190" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#9a3412">LLM Provider</text>
  <text x="925" y="230" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155">DeepSeek / OpenAI 兼容</text>
  <text x="925" y="260" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155">会议理解、任务抽取</text>
  <text x="925" y="290" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155">总结生成、风险判断</text>

  <rect x="895" y="430" width="250" height="215" rx="18" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="925" y="475" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#334155">本地可观测层</text>
  <text x="925" y="515" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155">SQLite 状态表</text>
  <text x="925" y="545" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155">Job 队列与审计日志</text>
  <text x="925" y="575" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#334155">Console API / React 前端</text>

  <path d="M304 400 C340 400 340 400 380 400" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M820 390 C865 330 860 255 895 245" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M895 537 C860 535 855 536 820 536" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M430 548 C360 590 325 590 274 552" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="690" width="1080" height="34" rx="17" fill="#dbeafe"/>
  <text x="92" y="713" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1e3a8a">核心原则：LLM 负责理解与规划，Agent 负责编排工具，Policy 控制真实副作用，飞书承载最终协作界面。</text>
</svg>
