<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">MeetFlow Dashboard static preview</title>
  <desc id="desc">A static preview of the MeetFlow feishuAgent dashboard, including M3, M4, M5, task tracking and evaluation panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#eef6f3"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect x="64" y="54" width="1072" height="572" rx="18" fill="#ffffff" filter="url(#shadow)"/>

  <rect x="64" y="54" width="220" height="572" rx="18" fill="#111827"/>
  <rect x="64" y="54" width="220" height="572" rx="18" fill="#111827"/>
  <rect x="92" y="91" width="42" height="42" rx="10" fill="#14b8a6"/>
  <text x="150" y="109" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">MeetFlow</text>
  <text x="150" y="130" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="12">Agent Console</text>

  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">
    <rect x="86" y="170" width="170" height="40" rx="8" fill="#1f2937"/>
    <text x="118" y="195" fill="#ffffff">Dashboard</text>
    <rect x="86" y="222" width="170" height="40" rx="8" fill="#0f172a"/>
    <text x="118" y="247" fill="#d1d5db">M3 会前</text>
    <rect x="86" y="274" width="170" height="40" rx="8" fill="#0f172a"/>
    <text x="118" y="299" fill="#d1d5db">M4 / M5 联调</text>
    <rect x="86" y="326" width="170" height="40" rx="8" fill="#0f172a"/>
    <text x="118" y="351" fill="#d1d5db">Agent 评测</text>
    <rect x="86" y="378" width="170" height="40" rx="8" fill="#0f172a"/>
    <text x="118" y="403" fill="#d1d5db">Jobs / Health</text>
  </g>

  <text x="324" y="112" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">飞书会议知识闭环 Agent</text>
  <text x="324" y="142" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="15">会前背景卡 · 会后总结任务卡 · 任务风险提醒 · RAG 更新 · 评测中心</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="324" y="178" width="230" height="136" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="346" y="213" fill="#0f172a" font-size="16" font-weight="800">M3 会前背景卡</text>
    <text x="346" y="244" fill="#475569" font-size="13">日历定位 · RAG 资料 · 群卡片</text>
    <text x="346" y="287" fill="#059669" font-size="28" font-weight="800">Ready</text>

    <rect x="579" y="178" width="230" height="136" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="601" y="213" fill="#0f172a" font-size="16" font-weight="800">Agent 轨迹评测</text>
    <text x="601" y="244" fill="#475569" font-size="13">工具顺序 · Policy · 幂等</text>
    <text x="601" y="287" fill="#2563eb" font-size="28" font-weight="800">0.97</text>

    <rect x="834" y="178" width="230" height="136" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="856" y="213" fill="#0f172a" font-size="16" font-weight="800">后台队列</text>
    <text x="856" y="244" fill="#475569" font-size="13">workflow · risk_scan · rag_refresh</text>
    <text x="856" y="287" fill="#f97316" font-size="28" font-weight="800">8 jobs</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="324" y="344" width="456" height="212" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="348" y="382" fill="#0f172a" font-size="17" font-weight="800">任务追踪</text>
    <text x="348" y="409" fill="#64748b" font-size="13">Review Sessions / Task Mappings / Risk Notifications</text>
    <rect x="348" y="438" width="384" height="28" rx="6" fill="#ecfdf5"/>
    <text x="364" y="457" fill="#047857" font-size="12" font-weight="700">m4_review_done · 3 个任务待确认</text>
    <rect x="348" y="478" width="384" height="28" rx="6" fill="#fff7ed"/>
    <text x="364" y="497" fill="#c2410c" font-size="12" font-weight="700">m5_due_soon · 2 个任务临期</text>
    <rect x="348" y="518" width="384" height="28" rx="6" fill="#eff6ff"/>
    <text x="364" y="537" fill="#1d4ed8" font-size="12" font-weight="700">rag_refresh · 文档索引已更新</text>

    <rect x="808" y="344" width="256" height="212" rx="12" fill="#111827"/>
    <text x="832" y="382" fill="#f8fafc" font-size="17" font-weight="800">日志终端</text>
    <text x="832" y="418" fill="#93c5fd" font-size="12">trace_id=m3_20260514</text>
    <text x="832" y="448" fill="#bbf7d0" font-size="12">policy=authorized</text>
    <text x="832" y="478" fill="#fde68a" font-size="12">card_send=dry_run</text>
    <text x="832" y="508" fill="#fca5a5" font-size="12">risk=owner_missing</text>
  </g>

  <text x="324" y="598" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="13">点击图片进入 docs/demo/index.html 静态交互演示页</text>
</svg>
